<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRM Servirodillos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: radial-gradient(circle at center, #1a1c24 0%, #0f1015 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { background: #8a2be2; top: 20%; left: 25%; }
        body::after  { background: #00ff88; bottom: 20%; right: 25%; }

        .login-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 20px;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 1;
            text-align: center;
        }

        .brand-header { margin-bottom: 35px; }
        .brand-header i {
            font-size: 3rem; color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.4);
            margin-bottom: 10px;
        }
        .brand-header h1 { color: #fff; font-size: 1.8rem; font-weight: 600; letter-spacing: 1px; }
        .brand-header p  { color: #8a92a6; font-size: 0.9rem; margin-top: 5px; }

        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group label {
            display: block; color: #a0aec0; font-size: 0.85rem;
            margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #64748b; transition: color 0.3s;
        }
        .input-wrapper input {
            width: 100%; padding: 14px 15px 14px 45px;
            background: rgba(15,16,21,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 0.95rem;
            outline: none; transition: all 0.3s ease;
        }
        .input-wrapper input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 10px rgba(138,43,226,0.3);
            background: rgba(15,16,21,0.8);
        }

        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171; padding: 12px; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 20px;
            display: none; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #8a2be2 0%, #4a0e8f 100%);
            border: none; border-radius: 10px; color: #fff;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138,43,226,0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138,43,226,0.6);
            background: linear-gradient(135deg, #9b42f5 0%, #5c16b3 100%);
        }
        .btn-login:active { transform: translateY(1px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-footer { margin-top: 25px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <i class="fa-solid fa-gears"></i>
            <h1>SERVIRODILLOS</h1>
            <p>Control de Actividades Comerciales</p>
        </div>

        <div id="errorAlert" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText">Usuario o clave incorrectos</span>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">CORREO ELECTRÓNICO</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="ejemplo@servirodillos.com" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>
            <div class="input-group">
                <label for="password">CONTRASEÑA</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left:8px"></i>
            </button>
        </form>

        <div class="login-footer">
            <p>&copy; 2026 Servirodillos SAS — Sistema Protegido</p>
        </div>
    </div>

    <script>
        const API_URL    = "https://crm-servirodillos.onrender.com";
        const loginForm  = document.getElementById('loginForm');
        const errorAlert = document.getElementById('errorAlert');
        const errorText  = document.getElementById('errorText');
        const btnLogin   = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Ocultar error previo y deshabilitar botón mientras carga
            errorAlert.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Ingresando...';

            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                // ✅ FIX: Verificar error ANTES de guardar en localStorage
                if (!response.ok) {
                    throw new Error(data.error || "Error al iniciar sesión");
                }

                // ✅ Solo guardamos si el login fue exitoso
                // data.usuario tiene: { id, nombre, email, rol }
                localStorage.setItem('usuarioCRM', JSON.stringify(data.usuario));

                // Redirigir al panel principal
                window.location.href = "/";

            } catch (error) {
                errorText.textContent = error.message;
                errorAlert.style.display = 'flex';

                // Rehabilitar botón si hubo error
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left:8px"></i>';
            }
        });
    </script>
</body>
</html>
