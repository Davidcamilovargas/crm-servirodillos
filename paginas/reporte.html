<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Servirodillos - Reporte Comercial</title>

  <style>
    /* Estilos base con la estética del proyecto */
    :root {
      --bg-principal: #0f111a;
      --glass-bg: rgba(26, 28, 36, 0.65);
      --border-neon: rgba(255, 255, 255, 0.08);
      --text-muted: #a0aec0;
      --pendiente-color: #f6ad55; /* Naranja para pendientes */
      --entregado-color: #48bb78; /* Verde para entregados */
    }

    body {
      background-color: var(--bg-principal);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 📊 TARJETAS DE INDICADORES */
    .kpi-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .kpi-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-neon);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .kpi-card h3 {
      margin: 0 0 10px 0;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kpi-value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    /* Barra de filtros de fecha y roles */
    .control-bar {
      background: var(--glass-bg);
      border: 1px solid var(--border-neon);
      padding: 15px 20px;
      border-radius: 12px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select, input, textarea {
      background: #1a1c24;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
    }

    /* 🟢 ESTADOS DE FILAS */
    .row-pendiente {
      border-left: 4px solid var(--pendiente-color);
    }

    .row-entregado {
      border-left: 4px solid var(--entregado-color);
      background: rgba(0, 0, 0, 0.2); 
    }

    .badge {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .badge-pendiente { background: rgba(246, 173, 85, 0.2); color: var(--pendiente-color); }
    .badge-entregado { background: rgba(72, 187, 120, 0.2); color: var(--entregado-color); }

    .btn-action {
      background: #2d3748;
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-action:hover { background: #4a5568; }
  </style>
</head>
<body>

  <div class="container">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
      <div>
        <h2 id="tituloReporte" style="margin: 0; color: #fff;">📊 Reporte Comercial Mensual</h2>
        <p id="subtituloUsuario" style="margin: 5px 0 0 0; color: var(--text-muted); font-size: 1.1rem; font-weight: 500;"></p>
      </div>
      
      <div id="contenedorFiltroVendedor" style="display: none; background: var(--glass-bg); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border-neon);">
        <label style="color: var(--text-muted); margin-right: 8px; font-size: 0.9rem;">Ver Asesor:</label>
        <select id="filtroVendedor" onchange="cambioVendedorAdmin()" style="padding: 5px 10px;">
          <option value="todos">🌍 Todos los Vendedores</option>
        </select>
      </div>
    </div>

    <div class="control-bar">
      <div>
        <label style="color: var(--text-muted); margin-right: 8px;">Mes:</label>
        <select id="filtroMes" onchange="cargarReporteMensual()">
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
      </div>

      <div>
        <label style="color: var(--text-muted); margin-right: 8px;">Año:</label>
        <select id="filtroAnio" onchange="cargarReporteMensual()">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
        </select>
      </div>

      <button class="btn-action" style="margin-left: auto; background: #3182ce;" onclick="abrirModalPedido()">＋ Agregar Pedido</button>
    </div>

    <div class="kpi-container">
      <div class="kpi-card">
        <h3>Total Ventas</h3>
        <div class="kpi-value" id="kpiTotal" style="color: #fff;">$ 0</div>
      </div>
      <div class="kpi-card">
        <h3>Meta del Mes</h3>
        <div class="kpi-value" id="kpiMeta" style="color: #3182ce;">$ 15.000.000</div>
      </div>
      <div class="kpi-card">
        <h3>Restante</h3>
        <div class="kpi-value" id="kpiRestante" style="color: #e53e3e;">$ 0</div>
      </div>
    </div>

    <div class="panel" style="background: var(--glass-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-neon);">
      <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
          <tr style="color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.1);">
            <th style="padding: 12px;">Fecha</th>
            <th>Pedido #</th>
            <th>Cliente / Empresa</th>
            <th>Estado</th>
            <th>Valor</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaPedidos">
          </tbody>
      </table>
    </div>
  </div>

  <div id="modalPedido" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center;">
    <div style="background: #1a1c24; border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
        <h3 style="margin: 0; color: #fff;">📦 Registrar Nuevo Pedido</h3>
        <span onclick="cerrarModalPedido()" style="color: #a0aec0; cursor: pointer; font-size: 1.5rem;">&times;</span>
      </div>

      <form id="formNuevoPedido" onsubmit="guardarPedido(event)">
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #a0aec0; margin-bottom: 5px; font-size: 0.9rem;">📅 Fecha:</label>
          <input type="date" id="pedFecha" required style="width: 100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #a0aec0; margin-bottom: 5px; font-size: 0.9rem;">🔢 Número de Pedido:</label>
          <input type="text" id="pedNumero" placeholder="Ej: 6035" required style="width: 100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #a0aec0; margin-bottom: 5px; font-size: 0.9rem;">🏢 Cliente / Empresa:</label>
          <select id="pedCliente" required style="width: 100%; box-sizing: border-box;">
            <option value="">Cargando clientes...</option>
          </select>
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; color: #a0aec0; margin-bottom: 5px; font-size: 0.9rem;">💵 Valor del Pedido ($):</label>
          <input type="number" id="pedValor" placeholder="Ej: 1050000" required style="width: 100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; color: #a0aec0; margin-bottom: 5px; font-size: 0.9rem;">📌 Estado Inicial:</label>
          <select id="pedEstado" style="width: 100%; box-sizing: border-box;">
            <option value="Pendiente">⏳ Pendiente</option>
            <option value="Entregado">📦 Entregado</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" onclick="cerrarModalPedido()" style="background: #2d3748; color: white; padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer;">Cancelar</button>
          <button type="submit" style="background: #3182ce; color: white; padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">💾 Guardar Pedido</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://crm-servirodillos.onrender.com"; 
    const ROL_USUARIO = localStorage.getItem('rol') || 'vendedor'; 
    const ID_USUARIO = localStorage.getItem('vendedorId') || 2; 
    
    // Controlará el ID a consultar en la API
    let vendedorSeleccionado = ID_USUARIO;

    const formatoMoneda = new Intl.NumberFormat('es-CO', {
      style: 'currency',
      currency: 'COP',
      minimumFractionDigits: 0
    });

    // 🔄 REPORTE MENSUAL INTEGRADOR
    async function cargarReporteMensual() {
      const mes = document.getElementById('filtroMes').value;
      const anio = document.getElementById('filtroAnio').value;
      
      let url = `${API_URL}/api/pedidos?mes=${mes}&anio=${anio}`;
      
      // Si el filtro no está en "todos", añadimos el ID correspondiente
      if (vendedorSeleccionado !== 'todos') {
        url += `&vendedorId=${vendedorSeleccionado}`;
      }

      try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('kpiTotal').innerText = formatoMoneda.format(data.kpis.totalVenta);
        document.getElementById('kpiMeta').innerText = formatoMoneda.format(data.kpis.meta);
        
        const restanteElement = document.getElementById('kpiRestante');
        restanteElement.innerText = formatoMoneda.format(data.kpis.restante);
        restanteElement.style.color = data.kpis.restante <= 0 ? '#48bb78' : '#e53e3e';

        const tbody = document.getElementById('tablaPedidos');
        tbody.innerHTML = '';

        if(data.pedidos.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-muted);">No hay pedidos registrados en este mes.</td></tr>`;
          return;
        }

        data.pedidos.forEach(p => {
          const claseFila = p.estado === 'Pendiente' ? 'row-pendiente' : 'row-entregado';
          const claseBadge = p.estado === 'Pendiente' ? 'badge-pendiente' : 'badge-entregado';
          const nuevoEstadoDestino = p.estado === 'Pendiente' ? 'Entregado' : 'Pendiente';
          const textoBoton = p.estado === 'Pendiente' ? '✔ Entregar' : '↩ Revertir';
          const fechaFormateada = new Date(p.fecha).toLocaleDateString('es-CO', { timeZone: 'UTC' });

          tbody.innerHTML += `
            <tr class="${claseFila}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
              <td style="padding: 15px;">${fechaFormateada}</td>
              <td style="font-weight: bold; color: #4299e1;">${p.numero_pedido}</td>
              <td>${p.cliente_nombre}</td>
              <td><span class="badge ${claseBadge}">${p.estado}</span></td>
              <td style="font-weight: bold;">${formatoMoneda.format(p.valor)}</td>
              <td>
                <button class="btn-action" onclick="cambiarEstadoPedido(${p.id}, '${nuevoEstadoDestino}')">
                  ${textoBoton}
                </button>
              </td>
            </tr>
          `;
        });
      } catch (error) {
        console.error("❌ Error cargando el reporte:", error);
      }
    }

    async function cambiarEstadoPedido(id, nuevoEstado) {
      try {
        const res = await fetch(`${API_URL}/api/pedidos/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estado: nuevoEstado })
        });
        if (res.ok) cargarReporteMensual();
      } catch (error) {
        console.error("Error al actualizar estado:", error);
      }
    }

    // 🚀 CONTROL ROLES: INICIALIZACIÓN DE LA VISTA
document.addEventListener("DOMContentLoaded", async () => {
  const mesActual = new Date().getMonth() + 1;
  document.getElementById('filtroMes').value = mesActual;

  // Intentamos leer 'nombre', si no 'nombreUsuario', o si no que use tu nombre por defecto
  const nombreUsuario = localStorage.getItem('nombre') || localStorage.getItem('nombreUsuario') || 'David Vargas';
  
  if (ROL_USUARIO === 'admin') {
    document.getElementById('tituloReporte').innerText = "💼 Panel de Control Comercial";
    document.getElementById('subtituloUsuario').innerText = `Administrador: ${nombreUsuario}`;
    document.getElementById('contenedorFiltroVendedor').style.display = 'block';
    
    await cargarVendedoresParaAdmin();
    vendedorSeleccionado = 'todos'; 
  } else {
    document.getElementById('tituloReporte').innerText = "📊 Reporte Comercial Mensual";
    document.getElementById('subtituloUsuario').innerText = `Asesor: ${nombreUsuario}`;
    vendedorSeleccionado = ID_USUARIO;
  }
  
  cargarReporteMensual();
});
    async function cargarVendedoresParaAdmin() {
      try {
        const res = await fetch(`${API_URL}/api/vendedores`); 
        const vendedores = await res.json();
        const selectVendedor = document.getElementById('filtroVendedor');
        
        vendedores.forEach(v => {
          selectVendedor.innerHTML += `<option value="${v.id}">👤 ${v.nombre}</option>`;
        });
      } catch (error) {
        console.error("❌ Error cargando vendedores:", error);
      }
    }

    function cambioVendedorAdmin() {
      vendedorSeleccionado = document.getElementById('filtroVendedor').value;
      cargarReporteMensual();
    }

    // 🚪 CONTROL DEL MODAL
    function abrirModalPedido() {
      document.getElementById('modalPedido').style.display = 'flex';
  document.getElementById('pedFecha').value = new Date().toISOString().split('T')[0];
  cargarClientesEnModal();
    }

    function cerrarModalPedido() {
      document.getElementById('modalPedido').style.display = 'none';
      document.getElementById('formNuevoPedido').reset();
    }

    async function cargarClientesEnModal() {
      try {
        let idFiltro = ROL_USUARIO === 'vendedor' ? ID_USUARIO : null;
        const urlBase = `${API_URL}/api/clientes`;
        const urlFinal = idFiltro ? `${urlBase}?vendedorId=${idFiltro}` : urlBase;

        const response = await fetch(urlFinal);
        const clientes = await response.json();
        const selectCliente = document.getElementById('pedCliente');

        if (!selectCliente) return;
        if (!clientes.length) {
          selectCliente.innerHTML = '<option value="">No tienes clientes asignados</option>';
          return;
        }

        selectCliente.innerHTML = '<option value="">-- Seleccione un cliente --</option>' + 
          clientes.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
      } catch (error) {
        console.error("❌ Error cargando clientes:", error);
      }
    }

    async function guardarPedido(event) {
      event.preventDefault();
      const nuevoPedido = {
        fecha: document.getElementById('pedFecha').value,
        numero_pedido: document.getElementById('pedNumero').value,
        cliente_nombre: document.getElementById('pedCliente').value,
        valor: document.getElementById('pedValor').value,
        estado: document.getElementById('pedEstado').value,
        vendedor_id: ID_USUARIO
      };

      try {
        const response = await fetch(`${API_URL}/api/pedidos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(nuevoPedido)
        });

        if (response.ok) {
          cerrarModalPedido();
          cargarReporteMensual();
        } else {
          const errData = await response.json();
          alert("Error al guardar: " + errData.error);
        }
      } catch (error) {
        console.error("❌ Error guardando pedido:", error);
      }
    }
  </script>
</body>
</html>
